name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            proj

      - name: Build release binary
        working-directory: proj
        run: cargo build --release

      - name: Prepare release bundle
        shell: pwsh
        run: |
          $bundleDir = Join-Path $pwd "dist\proj-windows-x86_64"
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          Copy-Item -LiteralPath "proj\target\release\proj.exe" -Destination (Join-Path $bundleDir "proj.exe") -Force
          Copy-Item -LiteralPath "README.md" -Destination (Join-Path $bundleDir "README.md") -Force
          Copy-Item -LiteralPath "install.ps1" -Destination (Join-Path $bundleDir "install.ps1") -Force
          Compress-Archive -Path "$bundleDir\*" -DestinationPath "dist\proj-windows-x86_64.zip" -Force

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/proj-windows-x86_64.zip
